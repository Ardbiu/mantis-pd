<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Mantis PD</title>
    <script>
      var pathSegmentsToKeep = 1;
      var locationPath = window.location.pathname.split('/').slice(1);
      var route = locationPath.slice(pathSegmentsToKeep).join('/');
      var target =
        window.location.protocol +
        '//' +
        window.location.hostname +
        (window.location.port ? ':' + window.location.port : '') +
        '/mantis-pd/?/' +
        route +
        (window.location.search ? '&' + window.location.search.slice(1).replace(/&/g, '~and~') : '') +
        window.location.hash;
      window.location.replace(target);
    </script>
  </head>
  <body></body>
</html>
